<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Quiz Agrotóxicos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TELA INICIAL -->
<div id="start-screen" class="screen">
  <h1>Quiz: Agrotóxicos</h1>
  <button id="play-btn">Play</button>
</div>

<!-- TELA DO QUIZ -->
<div id="game-screen" class="screen hidden">

  <h2 id="question"></h2>

  <div id="answers"></div>

  <h3 id="feedback"></h3>
  <p id="score">Pontuação: 0</p>

</div>

<script src="script.js"></script>
</body>
</html>
